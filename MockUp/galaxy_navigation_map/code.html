<body class="bg-background text-on-surface font-body-md h-screen w-screen overflow-hidden relative flex flex-col selection:bg-primary/30">
<!-- JSON TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin py-base bg-surface/80 dark:bg-surface/80 backdrop-blur-md border-b border-outline-variant/10">
<button class="text-primary dark:text-primary-fixed hover:bg-primary/10 transition-colors p-2 rounded flex items-center justify-center">
<span class="material-symbols-outlined">rocket_launch</span>
</button>
<h1 class="text-headline-md font-headline-md text-primary-fixed drop-shadow-[0_0_4px_rgba(47,217,244,0.6)]">Aethelgard System</h1>

</button>
</header>

</div>
<div class="flex justify-between items-center px-1">
<div class="flex items-center gap-1" title="Terran Command"><span class="material-symbols-outlined text-[16px] text-primary">military_tech</span><span class="font-label-sm text-label-sm text-primary">85</span></div>
<div class="flex items-center gap-1" title="Syndicate"><span class="material-symbols-outlined text-[16px] text-secondary">monetization_on</span><span class="font-label-sm text-label-sm text-secondary">42</span></div>
<div class="flex items-center gap-1" title="Outriders"><span class="material-symbols-outlined text-[16px] text-tertiary">explore</span><span class="font-label-sm text-label-sm text-tertiary">12</span></div>
<div class="flex items-center gap-1" title="Void Swarm"><span class="material-symbols-outlined text-[16px] text-error">warning</span><span class="font-label-sm text-label-sm text-error">-99</span></div>

</div>
</div>
<!-- Main Map Canvas -->
<main class="flex-1 relative w-full h-full bg-grid">

<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-container-highest/20 via-background to-background pointer-events-none"></div>
<!-- SVG for Jump Gates (Lines) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none z-0">
<defs>
<filter height="140%" id="cyanGlow" width="140%" x="-20%" y="-20%">
<fegaussianblur result="blur" stddeviation="3"></fegaussianblur>
<fecomposite in="SourceGraphic" in2="blur" operator="over"></fecomposite>
</filter>
</defs>
<!-- Core to Core (Cyan Glowing) -->
<line filter="url(#cyanGlow)" opacity="0.8" stroke="#22d3ee" stroke-width="1.5" x1="50%" x2="30%" y1="45%" y2="25%"></line>
<line filter="url(#cyanGlow)" opacity="0.6" stroke="#22d3ee" stroke-width="1.5" x1="50%" x2="75%" y1="45%" y2="35%"></line>
<!-- Core to Frontier (Amber) -->
<line opacity="0.5" stroke="#ffb95f" stroke-dasharray="4,2" stroke-width="1" x1="50%" x2="60%" y1="45%" y2="70%"></line>
<!-- Frontier to Outer (Gray) -->
<line opacity="0.3" stroke="#859397" stroke-dasharray="2,4" stroke-width="1" x1="60%" x2="20%" y1="70%" y2="80%"></line>
</svg>
<!-- Node: Helios Prime (Selected Core) -->

<div class="w-4 h-4 rounded-full bg-primary border border-surface-container-highest shadow-[0_0_12px_rgba(34,211,238,0.8)]"></div>
</div>
<span class="text-label-sm font-label-sm text-primary bg-background/90 px-1.5 py-0.5 rounded-sm border border-primary/30 backdrop-blur-sm shadow-[0_0_4px_rgba(34,211,238,0.3)]">Helios Prime</span>

<span class="text-label-sm font-label-sm text-outline bg-background/50 px-1 py-0.5 rounded-sm opacity-50">Unknown</span>
