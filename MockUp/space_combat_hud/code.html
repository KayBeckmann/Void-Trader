<!-- Very basic inline JS for visual joystick feedback (purely cosmetic) -->
<script>
        const knob = document.getElementById('joystick-knob');
        const zone = document.getElementById('joystick-zone');
        
        // Quick visual feedback for touching the joystick area
        if(zone && knob) {
            zone.addEventListener('pointerdown', (e) => {
                knob.style.transform = 'scale(0.9)';
                knob.style.borderColor = '#8aebff'; // active highlight
            });
            zone.addEventListener('pointerup', (e) => {
                knob.style.transform = 'scale(1)';
                knob.style.transform = 'translate(0px, 0px)';
                knob.style.borderColor = '#22d3ee'; // revert
            });
            zone.addEventListener('pointerleave', (e) => {
                knob.style.transform = 'scale(1)';
                knob.style.transform = 'translate(0px, 0px)';
                knob.style.borderColor = '#22d3ee'; // revert
            });
            // Simulate slight movement visually
            zone.addEventListener('pointermove', (e) => {
                if(e.buttons > 0) {
                    const rect = zone.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    let dx = e.clientX - centerX;
                    let dy = e.clientY - centerY;
                    
                    // Clamp visually
                    const maxDist = 20;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist > maxDist) {
                        dx = (dx/dist) * maxDist;
                        dy = (dy/dist) * maxDist;
                    }
                    
                    knob.style.transform = `translate(${dx}px, ${dy}px) scale(0.9)`;
                }
            });
        }
    </script>
