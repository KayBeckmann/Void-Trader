services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: void-trader-web:${APP_VERSION:-dev}
    container_name: ${COMPOSE_PROJECT_NAME:-void-trader}_web
    ports:
      - "${APP_PORT:-8080}:80"
    restart: ${RESTART_POLICY:-unless-stopped}
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
